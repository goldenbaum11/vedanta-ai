# Vedanta AI — production-ish Docker Compose stack.
#
# Brings up: Postgres, ChromaDB server, FastAPI backend, Next.js frontend.
# The optional Sanskrit Heritage Platform service is included as a
# commented stub — there's no canonical public image, so swap in the
# self-hosted one you want or leave the integration disabled.
#
# Run:
#     cp .env.docker.example .env
#     # edit .env: SECRET_KEY, ENCRYPTION_KEY, POSTGRES_PASSWORD, etc.
#     docker compose up --build
#
# Notes:
# - Postgres and Chroma persist on named volumes; backend writeable
#   state (logs, optional SQLite override) lives under /data on a
#   separate volume so DB and vectors stay decoupled.
# - The local LLM (Ollama / LM Studio / etc.) runs on the host, NOT
#   inside this stack. Set OLLAMA_BASE_URL=http://host.docker.internal:11434
#   in your .env so containers can reach it. Linux users without that
#   alias should set their host's bridge IP instead.

name: vedanta-ai

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vedanta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-vedanta}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vedanta} -d ${POSTGRES_DB:-vedanta}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    environment:
      # --- core ---
      DATABASE_URL: postgresql://${POSTGRES_USER:-vedanta}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-vedanta}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      CHROMA_SSL: "false"

      # --- LLM (host-side; override in .env) ---
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-http://host.docker.internal:1234/v1}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-lm-studio}

      # --- embeddings ---
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-default}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}

      # --- security ---
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      RATE_LIMIT_CHAT_ANONYMOUS: ${RATE_LIMIT_CHAT_ANONYMOUS:-30/minute}
      RATE_LIMIT_CHAT_AUTHENTICATED: ${RATE_LIMIT_CHAT_AUTHENTICATED:-120/minute}
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-10/minute}

      # --- Sanskrit Heritage Platform (optional) ---
      SANSKRIT_HERITAGE_ENABLED: ${SANSKRIT_HERITAGE_ENABLED:-false}
      SANSKRIT_HERITAGE_BASE_URL: ${SANSKRIT_HERITAGE_BASE_URL:-https://sanskrit.inria.fr/cgi-bin/SKT/sktreader.cgi}

      # --- web / CORS ---
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/data
    extra_hosts:
      # Lets containers resolve the host on Linux, mirrors the
      # Docker Desktop default on macOS / Windows.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Baked into the Next.js bundle at build time.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  # --- Optional: self-hosted Sanskrit Heritage Platform -----------------
  #
  # No upstream Docker image exists. Build one from the Inria source
  # and reference it here when you have it. With this service running,
  # set in .env:
  #
  #   SANSKRIT_HERITAGE_ENABLED=true
  #   SANSKRIT_HERITAGE_BASE_URL=http://shp:8080/cgi-bin/SKT/sktreader.cgi
  #
  # shp:
  #   image: your-registry/sanskrit-heritage:latest
  #   restart: unless-stopped
  #   ports:
  #     - "${SHP_PORT:-8088}:8080"

volumes:
  postgres_data:
  chroma_data:
  backend_data:
